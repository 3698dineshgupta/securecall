version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: securecall_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: securecall
      POSTGRES_USER: securecall_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securecall_user -d securecall"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securecall_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://securecall_user:${DB_PASSWORD}@postgres:5432/securecall
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      BCRYPT_ROUNDS: 12
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_network
      - frontend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Signaling Server ─────────────────────────────────────────────────────────
  signaling:
    build:
      context: ./signaling
      dockerfile: Dockerfile
    container_name: securecall_signaling
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SIGNALING_PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (served by Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_SIGNALING_URL: ${REACT_APP_SIGNALING_URL}
    container_name: securecall_frontend
    restart: unless-stopped
    networks:
      - frontend_network

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: securecall_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
      - ssl_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - signaling
      - frontend
    networks:
      - frontend_network

  # ── Certbot (SSL) ────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: securecall_certbot
    volumes:
      - certbot_data:/var/www/certbot
      - ssl_certs:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot
             --email ${ADMIN_EMAIL} --agree-tos --no-eff-email
             -d ${DOMAIN}
    profiles:
      - ssl

networks:
  backend_network:
    driver: bridge
    internal: true
  frontend_network:
    driver: bridge

volumes:
  postgres_data:
  certbot_data:
  ssl_certs:
