services:
  - type: web
    name: securecall-backend
    env: node
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: securecall-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
  
  - type: web
    name: securecall-signalings
    env: node
    buildCommand: "cd signaling && npm install"
    startCommand: "cd signaling && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: securecall-backend
          property: envVar
          envVarKey: JWT_SECRET
        
  - type: web
    name: secure-call
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/build"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://securecall-1p6a.onrender.com/api
      - key: REACT_APP_SIGNALING_URL
        value: https://securecall-signalings.onrender.com

databases:
  - name: securecall-db
    databaseName: securecall
    user: securecall_user
