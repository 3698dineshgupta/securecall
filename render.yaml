services:
  # Base env group to share variables like JWT secrets across services
  - type: web
    name: securecall-backend
    env: node
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: securecall-db
          property: connectionString
      # Allow frontend URL to be accessed (needs to be manually set in dashboard once known)
      - key: FRONTEND_URL
        sync: false
  
  - type: web
    name: securecall-signaling
    env: node
    buildCommand: "cd signaling && npm install"
    startCommand: "cd signaling && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SIGNALING_PORT
        value: 3002
      - key: JWT_SECRET
        fromService:
          type: web
          name: securecall-backend
          property: envVar
          envVarKey: JWT_SECRET
      - key: FRONTEND_URL
        sync: false
        
  - type: web
    name: securecall-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/build"
    routes:
      # This fixes the "Not Found" error on refresh in Render!
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: securecall-backend
          property: hostport
      - key: REACT_APP_SIGNALING_URL
        fromService:
          type: web
          name: securecall-signaling
          property: hostport

databases:
  - name: securecall-db
    databaseName: securecall
    user: securecall_user
